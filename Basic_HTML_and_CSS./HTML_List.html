<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML List</title>
    <link rel="stylesheet" type="text/css" href="CSS_List.css">

</head>
<body>
<!-- ordered list -->
   
<h1>My favorite sports</h1>
   <ol>
    <li>Football</li>
    <li>Basketball</li>
    <li>Volleyball</li>
    <li>Tennis</li>
    <li>Swimming</li>
   </ol>
   
     <!-- unordered list -->

<h1>My favorite foods</h1>
    <ul>
        <li>Pizza</li>
        <li>Burgers</li>
        <li>Sushi</li>
        <li>Pasta</li>
        <li>Ice cream</li>
    </ul>

     
</body>
</html>
