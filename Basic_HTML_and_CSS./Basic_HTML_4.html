<!DOCTYPE html>
<html>
<head>
    <title>CSS Classes</title>
</head>

<body>
    <style>
         /* Dark style with yellow text */
        .font_1 {
            background-color:black;
            color:yellow;
            font-size:large;
        }
         /* Dark blue style with bold underline */
        .font_2 {
            background-color: darkblue;
            color:white;
            font-size:medium;
            text-decoration:underline;
            font-weight:bold;
        }
    </style>

    <!-- Paragraphs styled with CSS classes -->
    <p class="font_2">This paragraph is written in my style</p>
    <h2 class="font_1">This h2 element is styled per class attribute font_1</h2>
    <h3 class="font_2">This h3 element is styled per class attribute font_2</h3>
    <h4 class="font_1">Even though this is an h4 element, it is styled per class attribute font_1</h4>
    
</body>
</html>
